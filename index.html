/* WRAP */

.dp img{

padding:14px;

border-radius:50px;
background:linear-gradient(90deg,#2563eb,#38bdf8);
font-weight:800;
font-size:15px;
color:#fff;
cursor:pointer;
position:relative;
overflow:hidden;
transition:.3s;
}

/* HOVER */
.cta:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 15px 40px rgba(56,189,248,.5);
}

/* CLICK */
.cta:active{
transform:scale(.95);
}

/* SHINE EFFECT */
.cta::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
transition:.7s;
}

.cta:hover::before{
left:100%;
}

/* TIMER */
.timer{
text-align:center;
margin-top:10px;
font-size:13px;
opacity:.7
}

/* URGENCY */
.urgency{

padding:14px;
border-radius:14px;
margin-top:12px;
text-align:center;
font-weight:600;
color:#38bdf8;
animation:blink 1.2s infinite;
}

@keyframes blink{
50%{opacity:.4}
}

/* BOTTOM CTA */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
padding:14px;
border-radius:20px 20px 0 0;
box-shadow:0 -5px 20px rgba(0,0,0,.6)

border-radius:50px;

font-weight:900;
color:#fff;
}

/* FLOATING ANIMATION */
.card{
animation:float 5s ease-in-out infinite;

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-4px)}
